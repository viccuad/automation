---

- name: Run Crowbar tests and collect results
  hosts: "{{ ardana_env }}"
  remote_user: root
  gather_facts: True
  vars:
    task: "tempest"

  pre_tasks:
    - include_role:
        name: rocketchat_notify
      vars:
        rc_action: "started"
        rc_state: "Started"
      when: rc_notify

  tasks:
    - block:
        - include_role:
            name: crowbar_setup
          vars:
            qa_crowbarsetup_cmd: onadmin_testsetup

      rescue:
        - include_role:
            name: rocketchat_notify
          vars:
            rc_action: "finished"
            rc_state: "Failed"
          when: rc_notify

        - name: Stop if something failed
          fail:
            msg: "{{ task }} failed."
      always:
        - include_role:
            name: jenkins_artifacts
          vars:
            jenkins_artifacts_to_collect:
              - src: "{{ admin_mkcloud_config_file }}"
              - src: "{{ qa_crowbarsetup_log }}"
              - src: "~/tempest.log"
              - src: "~/tempest.subunit.log"
          when: lookup("env", "WORKSPACE")

        - include_role:
            name: send_to_os_health
          when: "'failed' not in tempest_status"


  post_tasks:
      - include_role:
          name: rocketchat_notify
        vars:
          rc_action: "finished"
          rc_state: "{{ (tempest_results_processed.results.3.stdout | int > 0) | ternary('Failed', 'Success' )}}"
        when: rc_notify
